name: Daily Run

on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-run
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq jq curl git gh python3

      - name: Authenticate GitHub CLI
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          if [ -z "$GH_PAT" ]; then
            echo "GH_PAT secret is not set" >&2
            exit 1
          fi
          echo "$GH_PAT" | gh auth login --with-token
          gh auth status

      - name: Install OpenCode
        run: |
          curl -fsSL https://opencode.ai/install | bash

      - name: Run CodeVoyager
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          export PATH="$HOME/.opencode/bin:$PATH"
          git config --global user.name "codevoyager-ai-dev"
          git config --global user.email "codevoyager-ai-dev@noreply.github.com"
          bash scripts/run.sh

      - name: Commit state updates
        run: |
          git config user.name "codevoyager-ai-dev"
          git config user.email "codevoyager-ai-dev@noreply.github.com"
          git add state.json memory/
          if ! git diff --cached --quiet; then
            git commit -m "chore: sync state"
            git push
          else
            echo "No state changes to commit"
          fi
