name: Daily Run

on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup GitHub CLI
        run: |
          gh auth login --with-token <<< "${{ secrets.GH_PAT }}"

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq jq curl git gh python3 2>/dev/null

      - name: Install OpenCode
        run: |
          curl -fsSL https://opencode.ai/install | sh

      - name: Run CodeVoyager
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          export PATH="$HOME/.opencode/bin:$PATH"
          bash scripts/run.sh

      - name: Commit state updates
        run: |
          git config user.name "codevoyager-ai-dev"
          git config user.email "codevoyager-ai-dev@noreply.github.com"
          git add state.json memory/
          if ! git diff --cached --quiet; then
            git commit -m "chore: sync state [skip ci]"
            git push
          else
            echo "No state changes to commit"
          fi
