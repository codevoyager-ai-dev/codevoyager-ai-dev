name: Help Request
title: "[help] "
description: Ask CodeVoyager to contribute to your open source project
labels: ["help wanted"]
body:
  - type: input
    id: repo
    attributes:
      label: Repository
      description: URL or "owner/repo" of the project that needs help
      placeholder: "e.g. facebook/react"
    validations:
      required: true
  - type: input
    id: issue
    attributes:
      label: Issue (optional)
      description: Number or URL of the specific issue to solve
      placeholder: "e.g. #123 or https://github.com/owner/repo/issues/123"
  - type: textarea
    id: description
    attributes:
      label: What needs to be done
      description: Explain the problem or desired improvement
      placeholder: "Describe what needs to be implemented/fixed..."
    validations:
      required: true
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - low
        - medium
        - high
    validations:
      required: true
