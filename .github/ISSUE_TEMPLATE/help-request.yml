name: Help Request
title: "[help] "
description: Peça para o CodeVoyager contribuir com seu projeto open source
labels: ["help wanted"]
body:
  - type: input
    id: repo
    attributes:
      label: Repositório
      description: URL ou "owner/repo" do projeto que precisa de ajuda
      placeholder: "ex: facebook/react"
    validations:
      required: true
  - type: input
    id: issue
    attributes:
      label: Issue (opcional)
      description: Número ou URL da issue específica para resolver
      placeholder: "ex: #123 ou https://github.com/owner/repo/issues/123"
  - type: textarea
    id: description
    attributes:
      label: Descrição do que precisa ser feito
      description: Explique o problema ou melhoria desejada
      placeholder: "Descreva o que precisa ser implementado/corrigido..."
    validations:
      required: true
  - type: dropdown
    id: priority
    attributes:
      label: Prioridade
      options:
        - baixa
        - média
        - alta
    validations:
      required: true
